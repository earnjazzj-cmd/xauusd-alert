name: XAUUSD Gold Alert

on:
  schedule:
    - cron: '*/30 * * * *'    # เปิดรอบใหม่ทุก 30 นาที (แต่ละรอบรันค้าง ~28 นาที)
  workflow_dispatch:           # ปุ่มกดรันเองได้ในแท็บ Actions

permissions:
  contents: write              # ให้ commit ไฟล์สถานะกลับ repo ได้

concurrency:
  group: xauusd-alert          # กันรันซ้อนกัน (รอบใหม่จะรอรอบเดิมจบ)
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run alert loop
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          LOCAL_TZ: Asia/Bangkok
          WATCH_CURRENCIES: USD
          WATCH_IMPACTS: High,Medium
          LOOP_SECONDS: '1700'
          LOOP_POLL_SEC: '60'
        run: python ci_loop.py

      - name: Save state back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerted_state.json last_brief.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no state change"
          else
            git commit -m "update alert state [skip ci]"
            git pull --rebase --autostash || true
            git push || echo "push skipped"
          fi
